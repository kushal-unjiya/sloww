server {
    listen 80;
    listen [::]:80;
    root /usr/share/nginx/html;
    index index.html;

    # Clerk + React Router use path-based URLs under /sign-in/*, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
